<style>

         color:#fff;font-size:15px;font-weight:600;cursor:pointer}

const b2a=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));

async function decryptWith(keyIvBits){
  const bits=new Uint8Array(keyIvBits);
  const key=await crypto.subtle.importKey("raw",bits.slice(0,32),{name:"AES-CBC"},false,["decrypt"]);
  const plain=await crypto.subtle.decrypt({name:"AES-CBC",iv:bits.slice(32,48)},key,b2a(DATA));
  const html=new TextDecoder().decode(plain);
  if(!html.slice(0,200).toLowerCase().includes("<!doctype")&&!html.slice(0,200).toLowerCase().includes("<html"))
    throw new Error("bad");
  document.open();document.write(html);document.close();
}

async function unlock(){
  const pw=document.getElementById("pw").value;
  if(!pw)return;
  document.getElementById("go").disabled=true;
  document.getElementById("err").textContent="解密中…";
  try{
    const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),{name:"PBKDF2"},false,["deriveBits"]);
    const bits=await crypto.subtle.deriveBits({name:"PBKDF2",salt:b2a(SALT),iterations:ITER,hash:"SHA-256"},km,384);
    localStorage.setItem("ledger_k",JSON.stringify({
      k:btoa(String.fromCharCode(...new Uint8Array(bits))),
      exp:Date.now()+REMEMBER_DAYS*864e5}));
    await decryptWith(bits);
  }catch(e){
    document.getElementById("err").textContent="密码不对，再试试";
    document.getElementById("go").disabled=false;
  }
}
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")unlock()});

(async()=>{
  try{
    const saved=JSON.parse(localStorage.getItem("ledger_k")||"null");
    if(saved&&saved.exp>Date.now())await decryptWith(b2a(saved.k).buffer);
    else localStorage.removeItem("ledger_k");
  }catch(e){localStorage.removeItem("ledger_k");}
})();
</script>
