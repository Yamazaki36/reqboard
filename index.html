<style>

  #pwgate button{width:100%;margin-top:14px;padding:12px;border:none;border-radius:10px;background:#3b82f6;
         color:#fff;font-size:15px;font-weight:600;cursor:pointer}

</style>

// 用密码 + 当前页面盐值解密出台账 HTML;密码错误会抛异常
async function decryptHtml(pw){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),{name:"PBKDF2"},false,["deriveBits"]);
  const bits=new Uint8Array(await crypto.subtle.deriveBits({name:"PBKDF2",salt:b2a(SALT),iterations:ITER,hash:"SHA-256"},km,384));
  const key=await crypto.subtle.importKey("raw",bits.slice(0,32),{name:"AES-CBC"},false,["decrypt"]);
  const plain=await crypto.subtle.decrypt({name:"AES-CBC",iv:bits.slice(32,48)},key,b2a(DATA));
  const html=new TextDecoder().decode(plain);
  if(!html.slice(0,200).toLowerCase().includes("<!doctype")&&!html.slice(0,200).toLowerCase().includes("<html"))
    throw new Error("bad");
  return html;
}
const show=html=>{document.open();document.write(html);document.close();};
// 记住密码本身而非派生密钥:与构建盐值解耦,新旧缓存版本都能自动解锁
const remember=pw=>localStorage.setItem("ledger_pw",
  JSON.stringify({p:btoa(unescape(encodeURIComponent(pw))),exp:Date.now()+REMEMBER_DAYS*864e5}));

async function unlock(){
  const pw=document.getElementById("pw").value;
  if(!pw)return;
  document.getElementById("go").disabled=true;
  document.getElementById("err").textContent="解密中…";
  try{
    const html=await decryptHtml(pw);
    remember(pw);
    show(html);
  }catch(e){
    document.getElementById("err").textContent="密码不对，再试试";
    document.getElementById("go").disabled=false;
  }
}
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")unlock()});

(async()=>{
  try{
    localStorage.removeItem("ledger_k");
    const saved=JSON.parse(localStorage.getItem("ledger_pw")||"null");
    if(!saved)return;
    if(saved.exp<Date.now()){localStorage.removeItem("ledger_pw");return;}
    document.getElementById("err").textContent="自动解锁中…";
    const pw=decodeURIComponent(escape(atob(saved.p)));
    const html=await decryptHtml(pw);
    remember(pw);  // 每次成功自动解锁都顺延 30 天
    show(html);
  }catch(e){
    // 自动解锁失败不清除记住的密码(可能只是碰上旧缓存版本),下次再试
    document.getElementById("err").textContent="";
  }
})();
</script>
</body>
